name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    # A throwaway Postgres so the DB integration tests run for real in CI. The
    # app connects as a superuser (RLS bypassed); tenancy is enforced by the
    # application-level predicates the tests exercise.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: herdflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/herdflow
      SESSION_SECRET: ci-test-secret
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply database schema
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f db/schema.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f db/migrations/0002_husbandry.sql

      - name: Lint
        run: npm run lint

      - name: Test (unit + DB integration)
        run: npm test

      - name: Build
        run: npm run build
